name: AGE — PRD SPOF Scanner

on:
  push:
    branches: [main]
    paths:
      - 'proposals/**/*.md'
      - 'cape-able-heroes/**/*.md'
      - '*.md'

permissions:
  contents: read
  issues: write

jobs:
  spof-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: AGE preflight runtime monitor
        run: python3 scripts/age_engineer.py preflight

      - name: Get changed markdown files
        run: |
          git diff --name-only HEAD~1 HEAD | grep '\.md$' > /tmp/changed_files.txt || true
          echo "Changed markdown files:"
          cat /tmp/changed_files.txt

      - name: Run SPOF scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 scripts/prd_spof_scanner.py \
            --files /tmp/changed_files.txt \
            --output /tmp/spof_issues.json

      - name: Create SPOF issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let issues;
            try {
              issues = JSON.parse(fs.readFileSync('/tmp/spof_issues.json', 'utf8'));
            } catch (e) {
              console.log('No SPOF issues file or empty result:', e.message);
              return;
            }

            if (!Array.isArray(issues) || issues.length === 0) {
              console.log('No SPOF issues to create.');
              return;
            }

            for (const issue of issues) {
              // Check for existing open issue with the same title
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'spof',
              });
              const alreadyExists = existing.data.some(i => i.title === issue.title);
              if (alreadyExists) {
                console.log(`Issue already exists: ${issue.title}`);
                continue;
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels: issue.labels,
              });
              console.log(`Created SPOF issue: ${issue.title}`);
            }

      - name: Post scan summary
        run: |
          echo "## AGE PRD SPOF Scan" >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/prd_spof_scanner.py \
            --files /tmp/changed_files.txt \
            --output /dev/null 2>&1 >> "$GITHUB_STEP_SUMMARY" || true

  way-through-scan:
    runs-on: ubuntu-latest
    # Only run when cape-able-heroes content or proposals change
    if: |
      contains(github.event.head_commit.modified, 'cape-able-heroes/') ||
      contains(github.event.head_commit.added, 'cape-able-heroes/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: AGE preflight runtime monitor
        run: python3 scripts/age_engineer.py preflight

      - name: Run Way Through anti-pattern scan
        id: wt_scan
        run: |
          python3 scripts/scan_content_antipatterns.py \
            --path cape-able-heroes/ \
            --output /tmp/wt_scan.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Post scan summary
        if: always()
        run: |
          echo "## AGE Way Through Anti-Pattern Scan" >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/scan_content_antipatterns.py --path cape-able-heroes/ --quiet \
            >> "$GITHUB_STEP_SUMMARY" 2>&1 || true

      - name: Fail if HIGH-severity rescue-modeling hits found
        if: steps.wt_scan.outcome == 'failure'
        run: |
          echo "❌ HIGH-severity rescue-modeling or aspiration-theater anti-patterns detected."
          echo "Review scan output above. Resolve all HIGH hits before merging."
          echo "Reference: cape-able-heroes/WAY-THROUGH-CONTENT-CHECKLIST.md"
          exit 1

