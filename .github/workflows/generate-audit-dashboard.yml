name: Generate Audit Dashboard

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:
  issues:
    types: [opened, labeled]

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'audit') || github.event_name != 'issues'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate AUDIT-DASHBOARD.md and dashboard-data.json
        run: |
          python3 << 'PYEOF'
          import re
          from collections import Counter
          from datetime import datetime

          with open('AUDIT-LOG.md', 'r') as f:
              content = f.read()

          # Basic stats
          total = len(re.findall(r'^## Audit:', content, re.MULTILINE))
          refused = content.count('Allowed: false')
          approved = content.count('Allowed: true')
          refusal_rate = round((refused / total * 100), 1) if total > 0 else 0

          # Top reasons
          reasons = re.findall(r'Reason: (.+)', content)
          top_reasons = Counter(reasons).most_common(8)

          # Recent activity (last 10 entries)
          recent = re.findall(r'^## Audit:.*', content, re.MULTILINE)[-10:][::-1]

          # Build dashboard markdown
          dashboard = f"""# Audit Dashboard

**Last Updated:** {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}

## Summary

| Metric            | Value      |
|-------------------|------------|
| Total Audits      | {total}    |
| Refusals          | {refused}  |
| Approvals         | {approved} |
| Refusal Rate      | {refusal_rate}% |

## Top Refusal Reasons

| Reason | Count |
|--------|-------|
"""

          for reason, count in top_reasons:
              dashboard += f"| {reason} | {count} |\n"

          dashboard += "\n## Recent Activity\n\n"
          for entry in recent:
              dashboard += f"- {entry}\n"

          dashboard += "\n---\n*This dashboard is automatically generated by GitHub Actions.*\n"

          with open('AUDIT-DASHBOARD.md', 'w') as f:
              f.write(dashboard)

          # Also generate JSON for future use
          import json
          data = {
              "last_updated": datetime.utcnow().isoformat() + "Z",
              "total_audits": total,
              "refusals": refused,
              "approvals": approved,
              "refusal_rate": refusal_rate,
              "top_reasons": [{"reason": r[0], "count": r[1]} for r in top_reasons]
          }
          with open('docs/dashboard-data.json', 'w') as f:
              json.dump(data, f, indent=2)

          print("AUDIT-DASHBOARD.md and dashboard-data.json generated successfully")
          PYEOF

      - name: Commit updated dashboard files
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            AUDIT-DASHBOARD.md
            docs/dashboard-data.json
          message: 'chore(dashboard): update AUDIT-DASHBOARD.md and data'
          default_author: github_actions