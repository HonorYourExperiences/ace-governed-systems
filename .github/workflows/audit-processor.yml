name: Audit Processor

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  process-audit:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'audit')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse audit issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            try {
              const body = context.payload.issue.body || '';
              const title = context.payload.issue.title || 'Untitled';
              const number = context.payload.issue.number;

              // Extract key fields using regex
              const actionMatch = body.match(/Action Type: (.+)/);
              const allowedMatch = body.match(/Allowed: (true|false)/);
              const reasonMatch = body.match(/Reason: (.+)/);
              const sourceMatch = body.match(/Source: (.+)/);

              core.setOutput('title', title);
              core.setOutput('number', number);
              core.setOutput('action', actionMatch ? actionMatch[1].trim() : 'unknown');
              core.setOutput('allowed', allowedMatch ? allowedMatch[1] : 'false');
              core.setOutput('reason', reasonMatch ? reasonMatch[1].trim() : '');
              core.setOutput('source', sourceMatch ? sourceMatch[1].trim() : 'unknown');

            } catch (error) {
              core.setFailed(`Failed to parse audit issue: ${error.message}`);
            }

      - name: Append to AUDIT-LOG.md
        id: append
        continue-on-error: true
        run: |
          echo "## Audit: ${{ steps.parse.outputs.title }}" >> AUDIT-LOG.md
          echo "- **Issue:** #${{ steps.parse.outputs.number }}" >> AUDIT-LOG.md
          echo "- **Action:** ${{ steps.parse.outputs.action }}" >> AUDIT-LOG.md
          echo "- **Allowed:** ${{ steps.parse.outputs.allowed }}" >> AUDIT-LOG.md
          echo "- **Reason:** ${{ steps.parse.outputs.reason }}" >> AUDIT-LOG.md
          echo "- **Source:** ${{ steps.parse.outputs.source }}" >> AUDIT-LOG.md
          echo "- **Timestamp:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> AUDIT-LOG.md
          echo "" >> AUDIT-LOG.md

      - name: Commit audit log update
        if: steps.append.outcome == 'success'
        uses: EndBug/add-and-commit@v9
        with:
          add: 'AUDIT-LOG.md'
          message: 'chore(audit): log new audit event #${{ steps.parse.outputs.number }}'
          default_author: github_actions

      - name: Create gap-closing proposal on refusal
        if: steps.parse.outputs.allowed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            try {
              const title = `Gap-Closing Proposal from Audit #${{ steps.parse.outputs.number }}`;
              const body = `This proposal was auto-generated from audit Issue #${{ steps.parse.outputs.number }}.

            **Reason:** ${{ steps.parse.outputs.reason }}

            Please review and convert into a formal SAGA proposal if appropriate.`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['proposal', 'gap-closing', 'auto-generated', 'audit']
              });
            } catch (error) {
              core.setFailed(`Failed to create gap-closing proposal: ${error.message}`);
            }