name: AGE — PR FMEA Risk Analysis

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  fmea-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enforce verified label gate for policy changes
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;
            const title = context.payload.pull_request.title || '';
            const body = context.payload.pull_request.body || '';

            const policyTargets = [
              { type: 'file', path: 'governed_systems_SOP_PFMEA_DFMEA.md' },
              { type: 'file', path: 'RUNTIME-MONITOR-WIRING.md' },
              { type: 'dir', path: 'proposals/' }
            ];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100
            });

            const touchesPolicy = files.some(file =>
              policyTargets.some(target =>
                target.type === 'file'
                  ? file.filename === target.path
                  : file.filename.startsWith(target.path)
              )
            );

            if (!touchesPolicy) {
              core.info('Verification gate skipped: PR does not modify policy/proposal files.');
              return;
            }

            const issueMatches = [...`${title}\n${body}`.matchAll(/#(\d+)\b/g)];
            const issueRefs = issueMatches.map(match => Number(match[1]));
            const refs = [...new Set(issueRefs)];
            if (refs.length === 0) {
              core.setFailed(
                'Verification gate failed: policy/proposal changes require at least one linked issue reference (e.g., "Closes #123") so needs-verification status can be checked.'
              );
              return;
            }

            const needsVerificationOnly = [];

            for (const issueNumber of refs) {
              try {
                const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
                const labels = (issue.data.labels || []).map(label => label.name).filter(Boolean);
                const hasNeeds = labels.includes('needs-verification');
                const isVerified = labels.includes('verified');

                if (hasNeeds && !isVerified) {
                  needsVerificationOnly.push(`#${issueNumber}`);
                }
              } catch (error) {
                core.warning(`Could not inspect labels for #${issueNumber}: ${error.message}`);
              }
            }

            if (needsVerificationOnly.length > 0) {
              core.setFailed(
                `Verification gate failed: The following linked issues require the \`verified\` label: ${needsVerificationOnly.join(', ')}.`
              );
              return;
            }

            core.info('Verification gate passed: no linked issue is blocked in `needs-verification` state.');

      - name: Run PR FMEA analysis
        id: fmea
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt
          python3 scripts/pr_fmea_analyzer.py \
            --diff /tmp/pr_diff.txt \
            --pr-number "${{ github.event.pull_request.number }}" \
            --pr-title "${{ github.event.pull_request.title }}" \
            --output /tmp/fmea_comment.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Post risk assessment comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('/tmp/fmea_comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment,
            });

      - name: Block PR on high severity
        if: steps.fmea.outputs.exit_code == '2'
        run: |
          echo "PR blocked: one or more findings have Severity >= 9. Human sign-off required."
          exit 1
