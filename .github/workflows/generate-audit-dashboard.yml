name: Generate Audit Dashboard

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:
  issues:
    types: [opened, labeled]

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'audit') || github.event_name != 'issues'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache dashboard outputs
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            AUDIT-DASHBOARD.md
            docs/dashboard-data.json
          key: dashboard-${{ hashFiles('AUDIT-LOG.md') }}
          restore-keys: |
            dashboard-

      - name: Generate AUDIT-DASHBOARD.md and dashboard-data.json
        id: generate
        if: steps.cache.outputs.cache-hit != 'true'
        run: python3 scripts/generate_dashboard.py

      - name: Commit updated dashboard files
        if: steps.generate.outcome == 'success' and steps.cache.outputs.cache-hit != 'true'
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            AUDIT-DASHBOARD.md
            docs/dashboard-data.json
          message: 'chore(dashboard): update AUDIT-DASHBOARD.md and data'
          default_author: github_actions

      - name: Upload dashboard as artifact
        if: steps.generate.outcome == 'success' and steps.cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: audit-dashboard-${{ github.run_number }}
          path: |
            AUDIT-DASHBOARD.md
            docs/dashboard-data.json
          retention-days: 365