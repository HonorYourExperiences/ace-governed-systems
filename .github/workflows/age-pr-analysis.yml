name: AGE — PR FMEA Risk Analysis

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  fmea-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run PR FMEA analysis
        id: fmea
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt
          python3 scripts/pr_fmea_analyzer.py \
            --diff /tmp/pr_diff.txt \
            --pr-number "${{ github.event.pull_request.number }}" \
            --pr-title "${{ github.event.pull_request.title }}" \
            --output /tmp/fmea_comment.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Post risk assessment comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('/tmp/fmea_comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment,
            });

      - name: Block PR on high severity
        if: steps.fmea.outputs.exit_code == '2'
        run: |
          echo "PR blocked: one or more findings have Severity >= 9. Human sign-off required."
          exit 1
