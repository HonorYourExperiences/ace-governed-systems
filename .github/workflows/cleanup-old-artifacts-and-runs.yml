name: Cleanup Old Artifacts and Workflow Runs

on:
  schedule:
    - cron: '0 8 * * 0'   # Every Sunday at 08:00 UTC
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: AGE preflight runtime monitor
        run: python3 scripts/age_engineer.py preflight

      - name: Delete old audit artifacts (> 180 days)
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const artifactNamePrefix = 'audit-dashboard-';
            const maxAgeDays = 180;
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - maxAgeDays);

            try {
              const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              let deletedArtifacts = 0;
              for (const artifact of artifacts.artifacts) {
                if (artifact.name.startsWith(artifactNamePrefix)) {
                  const createdAt = new Date(artifact.created_at);
                  if (createdAt < cutoffDate) {
                    console.log(`Deleting artifact: ${artifact.name} (ID: ${artifact.id})`);
                    await github.rest.actions.deleteArtifact({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      artifact_id: artifact.id
                    });
                    deletedArtifacts++;
                  }
                }
              }
              console.log(`Deleted ${deletedArtifacts} old artifacts.`);
            } catch (error) {
              core.setFailed(`Artifact cleanup failed: ${error.message}`);
            }

  cleanup-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: AGE preflight runtime monitor
        run: python3 scripts/age_engineer.py preflight

      - name: Delete old workflow runs and logs (> 90 days)
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const maxAgeDays = 90;
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - maxAgeDays);

            try {
              const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              let deletedRuns = 0;
              for (const run of runs.workflow_runs) {
                const createdAt = new Date(run.created_at);
                if (createdAt < cutoffDate) {
                  console.log(`Deleting run #${run.id} (${run.name})`);
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id
                  });
                  deletedRuns++;
                }
              }
              console.log(`Deleted ${deletedRuns} old workflow runs.`);
            } catch (error) {
              core.setFailed(`Workflow run cleanup failed: ${error.message}`);
            }
