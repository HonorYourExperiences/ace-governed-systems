name: Generate Audit Dashboard Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:  # Allow manual trigger
  issues:
    types: [opened, labeled, closed]

permissions:
  contents: write

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'audit') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: AGE preflight runtime monitor
        run: python3 scripts/age_engineer.py preflight

      - name: Parse AUDIT-LOG.md and generate dashboard data
        id: generate
        run: python3 scripts/generate_dashboard.py

      - name: Commit dashboard data
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            AUDIT-DASHBOARD.md
            docs/dashboard-data.json
          message: 'chore(dashboard): update audit dashboard data'
          default_author: github_actions
