<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYDT Audit Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <style>
        :root {
            --color-cream: #f8f4ed;
            --color-navy: #0A162F;
            --color-gold: #BFA16B;
        }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 40px; 
            background: var(--color-cream); 
            color: var(--color-navy); 
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1, h2 { color: var(--color-navy); }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin: 30px 0; 
        }
        .stat-card { 
            background: white; 
            padding: 24px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #e5e5e5;
        }
        .stat-value { 
            font-size: 2.25rem; 
            font-weight: 700; 
            color: var(--color-gold); 
            line-height: 1;
        }
        .chart-container {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-top: 20px;
            height: 420px;
        }
        .source-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 9999px;
            background: #e5e5e5;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BYDT Audit Dashboard</h1>
        <p id="last-updated" style="color: #666; margin-bottom: 8px;">Loading data...</p>
        <p id="data-source" style="margin-top: 0; font-size: 0.875rem;"></p>

        <div class="stats">
            <div class="stat-card">
                <div style="font-size: 0.875rem; color: #666; margin-bottom: 8px;">Total Audits</div>
                <div class="stat-value" id="total-audits">--</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.875rem; color: #666; margin-bottom: 8px;">Refusals</div>
                <div class="stat-value" id="refusals">--</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.875rem; color: #666; margin-bottom: 8px;">Refusal Rate</div>
                <div class="stat-value" id="refusal-rate">--</div>
            </div>
        </div>

        <h2>Top Refusal Reasons</h2>
        <div class="chart-container">
            <canvas id="reasons-chart"></canvas>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        async function fetchFromGitHubAPI() {
            const response = await fetch(
                'https://api.github.com/repos/HonorYourExperiences/ace-governed-systems/issues?labels=audit&state=all&per_page=100'
            );
            
            if (!response.ok) {
                throw new Error(`GitHub API error: ${response.status}`);
            }
            
            return await response.json();
        }

        function parseAuditIssues(issues) {
            let total = issues.length;
            let refused = 0;
            let reasons = [];

            issues.forEach(issue => {
                const body = issue.body || '';
                
                if (body.includes('Allowed: false')) {
                    refused++;
                }
                
                // Extract reason
                const reasonMatch = body.match(/Reason: (.+)/);
                if (reasonMatch) {
                    reasons.push(reasonMatch[1].trim());
                }
            });

            // Calculate top reasons
            const reasonCounts = {};
            reasons.forEach(reason => {
                reasonCounts[reason] = (reasonCounts[reason] || 0) + 1;
            });

            const topReasons = Object.entries(reasonCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8)
                .map(([reason, count]) => ({ reason, count }));

            const refusalRate = total > 0 ? Math.round((refused / total) * 100) : 0;

            return {
                total_audits: total,
                refusals: refused,
                approvals: total - refused,
                refusal_rate: refusalRate,
                top_reasons: topReasons,
                last_updated: new Date().toISOString()
            };
        }

        async function loadDashboard() {
            let data;
            let source = 'static';

            try {
                // Try live GitHub API first
                const issues = await fetchFromGitHubAPI();
                data = parseAuditIssues(issues);
                source = 'live';
            } catch (apiError) {
                console.warn('GitHub API failed, falling back to static data:', apiError);
                
                // Fallback to static JSON
                try {
                    const response = await fetch('dashboard-data.json');
                    if (!response.ok) throw new Error('Static data also failed');
                    data = await response.json();
                } catch (staticError) {
                    console.error('Both live and static data failed:', staticError);
                    document.getElementById('last-updated').textContent = 'Failed to load dashboard data.';
                    return;
                }
            }

            // Update UI
            document.getElementById('last-updated').textContent = 
                'Last updated: ' + new Date(data.last_updated).toLocaleString();
            
            document.getElementById('data-source').innerHTML = 
                source === 'live' 
                    ? '<span class="source-badge" style="background:#dcfce7;color:#166534;">Live from GitHub API</span>' 
                    : '<span class="source-badge">Static data (API unavailable)</span>';

            document.getElementById('total-audits').textContent = data.total_audits;
            document.getElementById('refusals').textContent = data.refusals;
            document.getElementById('refusal-rate').textContent = data.refusal_rate + '%';

            // Render chart
            const ctx = document.getElementById('reasons-chart');
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.top_reasons.map(r => r.reason),
                    datasets: [{
                        label: 'Count',
                        data: data.top_reasons.map(r => r.count),
                        backgroundColor: '#BFA16B',
                        borderColor: '#BFA16B',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            formatter: (value) => value,
                            color: '#0A162F',
                            font: { weight: 'bold', size: 13 }
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#e5e5e5' } },
                        x: { grid: { display: false } }
                    }
                },
                plugins: [ChartDataLabels]
            });
        }

        loadDashboard();
    </script>
</body>
</html>
